services:
  caddy:
    image: "${CADDY_IMAGE:-caddy:2.8.4}"
    container_name: litellm_caddy
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    env_file:
      - path: env/compose.defaults.env
        required: true
      - path: .env
        required: false
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

volumes:
  caddy_data:
    name: litellm_proxy_caddy_data
  caddy_config:
    name: litellm_proxy_caddy_config
