services:
  caddy:
    image: "${CADDY_IMAGE:-caddy:2.8.4}"
    container_name: litellm_caddy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      litellm:
        condition: service_healthy
    environment:
      PUBLIC_DOMAIN: "${PUBLIC_DOMAIN:?PUBLIC_DOMAIN must be set}"
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

volumes:
  caddy_data:
    name: litellm_proxy_caddy_data
  caddy_config:
    name: litellm_proxy_caddy_config
